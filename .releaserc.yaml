plugins:
  - [
      "@semantic-release/commit-analyzer",
      {
        "releaseRules": [
          { "type": "chore", "scope": "deps", "release": "patch" },
          { "type": "chore", "scope": "dependencies", "release": "patch" },
          { "type": "refactor", "release": "patch" },
          { "type": "style", "release": "patch" }
        ]
      }
    ]
  - "@semantic-release/release-notes-generator"
  - "@semantic-release/changelog"
  - [
      "@semantic-release/exec",
      {
        prepareCmd: "sed -i 's/\"version\": \".*\"/\"version\": \"${nextRelease.version}\"/' package.json && sed -i 's/const Version = \".*\"/const Version = \"${nextRelease.version}\"/' main.go && sed -i 's/\"version\": \".*\"/\"version\": \"${nextRelease.version}\"/' handlers/health.go"
      }
    ]
  - [
      "@semantic-release/git",
      {
        message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}",
        assets: ["CHANGELOG.md", "package.json", "main.go", "handlers/health.go"],
      },
    ]
  - "@semantic-release/github"

branches:
  - main
