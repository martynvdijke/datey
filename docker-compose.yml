services:
  datey:
    build: .
    container_name: datey
    restart: unless-stopped
    ports:
      - "6270:6270"
    volumes:
      - datey_data:/data
    environment:
      - PORT=6270
      - DATA_DIR=/data
      - SCHEDULER_HOUR=8
      - REMINDER_DAYS=7
      - LOG_LEVEL=warn
      - LOG_BUFFER_SIZE=10000
      - OTEL_ENDPOINT=
      # Email
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_TLS=true
      - NOTIFICATION_EMAIL=
      # Gotify
      - GOTIFY_URL=
      - GOTIFY_TOKEN=
      # Telegram
      - TELEGRAM_BOT_TOKEN=
      - TELEGRAM_CHAT_ID=

volumes:
  datey_data:
