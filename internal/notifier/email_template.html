<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
    .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #0d6efd; color: white; padding: 24px; text-align: center; }
    .header h1 { margin: 0; font-size: 20px; }
    .body { padding: 24px; color: #333; line-height: 1.5; }
    .footer { padding: 16px 24px; background: #f8f9fa; color: #6c757d; font-size: 12px; text-align: center; border-top: 1px solid #eee; }
    .timestamp { color: #6c757d; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{.Title}}</h1>
    </div>
    <div class="body">
      <p>{{.Message}}</p>
      <p class="timestamp">Sent at {{.Timestamp}}</p>
    </div>
    <div class="footer">
      Datey - Important Date Reminder
    </div>
  </div>
</body>
</html>
