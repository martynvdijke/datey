<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  {{if and .UmamiURL .UmamiWebsiteID}}
    <script async defer src="{{.UmamiURL}}/script.js" data-website-id="{{.UmamiWebsiteID}}"></script>
  {{end}}
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.02em; }
    .event-type-badge { font-size: 0.8rem; }
  </style>
  {{block "head_extra" .}}{{end}}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">Datey</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        {{if .User}}
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/contacts">Contacts</a></li>
            <li class="nav-item"><a class="nav-link" href="/groups">Groups</a></li>
            <li class="nav-item"><a class="nav-link" href="/calendar">Calendar</a></li>
            {{if .IsAdmin}}
              <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
              <li class="nav-item"><a class="nav-link" href="/users">Users</a></li>
            {{end}}
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" role="button">
                {{.User.Username}}
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="/logout">Log out</a></li>
              </ul>
            </li>
          </ul>
        {{end}}
      </div>
    </div>
  </nav>
  <main class="container">
    {{template "content" .}}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
