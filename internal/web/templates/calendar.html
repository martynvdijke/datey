{{define "head_extra"}}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<style>
  #calendar { max-width: 1100px; margin: 0 auto; padding: 1rem; background: #fff; border-radius: 0.5rem; }
  .fc .fc-button-primary { background-color: #212529; border-color: #212529; }
  .fc .fc-button-primary:hover { background-color: #424649; border-color: #373b3e; }
  .fc .fc-button-primary:not(:disabled).fc-button-active,
  .fc .fc-button-primary:not(:disabled):active { background-color: #000; border-color: #000; }
  .fc .fc-daygrid-event { white-space: normal; }
</style>
{{end}}

{{define "content"}}
<h1 class="mb-4">Calendar</h1>
<div id="calendar"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,dayGridWeek,dayGridDay'
      },
      events: {
        url: '/api/calendar-events',
        method: 'GET',
        failure: function() {
          console.error('Failed to fetch calendar events');
        }
      },
      eventClick: function(info) {
        var props = info.event.extendedProps;
        var desc = props.description || 'No description';
        alert(
          info.event.title +
          '\nDate: ' + info.event.start.toLocaleDateString() +
          '\nType: ' + (props.type || 'N/A') +
          '\nDescription: ' + desc
        );
      },
      loading: function(isLoading) {
        if (isLoading) {
          calendarEl.style.opacity = '0.5';
        } else {
          calendarEl.style.opacity = '1';
        }
      }
    });
    calendar.render();
  });
</script>
{{end}}
