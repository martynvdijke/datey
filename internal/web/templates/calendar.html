{{define "head_extra"}}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet" integrity="sha384-VwCb/syy+cGQ+sZ+eg0VGVtCf3n1rmPjyOiyza3qQ7VHAhKpximMSHnbL6SZt77U" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js" integrity="sha384-B1OFx8Gy9GjPu8UbUyXbGQpzll9ubAUQ9agInFJ8NnD7nYG1u/CLR+Sqr5yifl4q" crossorigin="anonymous"></script>
<style>
  #calendar-container { max-width: 1100px; margin: 0 auto; }
</style>
<noscript>
  <style>
    #calendar-container { display: none; }
  </style>
</noscript>
{{end}}

{{define "content"}}
<h1 class="mb-4">Calendar</h1>
<div id="calendar-container">
  <div id="calendar-loading" class="calendar-loading">
    <div class="spinner-border text-secondary" role="status">
      <span class="visually-hidden">Loading calendar...</span>
    </div>
    <p class="mt-2">Loading calendar...</p>
  </div>
  <div id="calendar-error" class="calendar-error">
    <p>Failed to load calendar events. Please try again later.</p>
  </div>
  <div id="calendar" style="display:none;"></div>
</div>

<noscript>
  <h2 class="mb-3">Upcoming Events</h2>
  {{if .UpcomingEvents}}
    <ul class="list-group">
      {{range .UpcomingEvents}}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <span><strong>{{.Name}}</strong> — {{.Date}}</span>
          <span class="badge event-type-badge event-{{.Type}}">{{.Type}}</span>
        </li>
      {{end}}
    </ul>
  {{else}}
    {{template "emptyState" (dict "Message" "No upcoming events in the next 30 days.")}}
  {{end}}
</noscript>

<!-- Event Details Modal -->
<div class="modal fade" id="eventModal" tabindex="-1" aria-labelledby="eventModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="eventModalLabel">Event Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p><strong>Contact:</strong> <span id="event-contact"></span></p>
        <p><strong>Date:</strong> <span id="event-date"></span></p>
        <p><strong>Type:</strong> <span id="event-type"></span></p>
        <p><strong>Description:</strong> <span id="event-description"></span></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var loadingEl = document.getElementById('calendar-loading');
    var errorEl = document.getElementById('calendar-error');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,dayGridWeek,dayGridDay'
      },
      events: {
        url: '/api/calendar-events',
        method: 'GET',
        failure: function() {
          errorEl.style.display = 'block';
          calendarEl.style.display = 'none';
        }
      },
      eventClick: function(info) {
        var props = info.event.extendedProps;
        document.getElementById('event-contact').textContent = info.event.title;
        document.getElementById('event-date').textContent = info.event.start.toLocaleDateString('en-US', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
        document.getElementById('event-type').textContent = props.type || 'N/A';
        document.getElementById('event-description').textContent = props.description || 'No description';
        var modal = new bootstrap.Modal(document.getElementById('eventModal'));
        modal.show();
      },
      loading: function(isLoading) {
        if (isLoading) {
          loadingEl.style.display = 'block';
          calendarEl.style.display = 'none';
        } else {
          loadingEl.style.display = 'none';
          calendarEl.style.display = 'block';
          errorEl.style.display = 'none';
        }
      },
      noEventsText: 'No events in this date range',
      height: 'auto'
    });
    calendar.render();
  });
</script>
{{end}}
