{{define "content"}}
<h1 class="mb-4">{{if .Contact}}Edit{{else}}Add{{end}} Contact</h1>
<div class="row">
  <div class="col-md-8 col-lg-6">
    <form action="/contacts/new" method="POST">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{if .Contact}}{{.Contact.Name}}{{end}}" required>
      </div>
      <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea class="form-control" id="notes" name="notes" rows="3">{{if .Contact}}{{.Contact.Notes}}{{end}}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">{{if .Contact}}Update{{else}}Create{{end}}</button>
      <a href="/contacts" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{{end}}
