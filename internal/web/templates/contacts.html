{{define "content"}}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="mb-0">Contacts</h1>
  <a href="/contacts/new" class="btn btn-primary">Add Contact</a>
</div>
<div class="row mb-3">
  <div class="col-md-6">
    <input type="search" class="form-control" name="q" placeholder="Search contacts..." hx-get="/contacts" hx-trigger="keyup changed delay:300ms" hx-target="#contacts-list" hx-select="#contacts-list">
  </div>
</div>
<div id="contacts-list">
  {{if .Contacts}}
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Events</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          {{range .Contacts}}
            <tr>
              <td><a href="/contacts/{{.ID}}">{{.Name}}</a></td>
              <td>{{len .Edges.Events}}</td>
              <td class="text-end">
                <a href="/contacts/{{.ID}}" class="btn btn-outline-primary btn-sm">View</a>
              </td>
            </tr>
          {{end}}
        </tbody>
      </table>
    </div>
  {{else}}
    <div class="alert alert-info" role="alert">
      No contacts yet. <a href="/contacts/new" class="alert-link">Add your first contact</a>.
    </div>
  {{end}}
</div>
{{end}}
