{{define "content"}}
<h1 class="mb-4">Upcoming Events</h1>
{{if .Events}}
  <div class="row g-3">
    {{range .Events}}
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="card-title mb-0">{{.Name}}</h5>
              <span class="badge bg-{{if eq .Type "birthday"}}primary{{else if eq .Type "anniversary"}}success{{else if eq .Type "wedding"}}warning text-dark{{else}}secondary{{end}} event-type-badge">{{.Type}}</span>
            </div>
            <p class="card-text text-muted">{{.Date}}</p>
            <p class="card-text">
              <strong class="{{if le .DaysRemaining 3}}text-danger{{else}}text-primary{{end}}">{{.DaysRemaining}} days</strong> remaining
            </p>
          </div>
        </div>
      </div>
    {{end}}
  </div>
{{else}}
  <div class="alert alert-info" role="alert">
    No upcoming events in the next {{.ReminderDays}} days.
  </div>
{{end}}
{{end}}
