{{define "content"}}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card text-center shadow-sm">
      <div class="card-body py-5">
        <h1 class="display-1 text-muted mb-3">{{.StatusCode}}</h1>
        <h4 class="card-title mb-3">{{.StatusText}}</h4>
        {{if eq .StatusCode 404}}
          <p class="card-text text-muted">The page you were looking for doesn't exist.</p>
        {{else if eq .StatusCode 500}}
          <p class="card-text text-muted">Something went wrong on our end. Please try again later.</p>
        {{else}}
          <p class="card-text text-muted">An unexpected error occurred.</p>
        {{end}}
        <a href="/" class="btn btn-primary mt-3">Go to Dashboard</a>
      </div>
    </div>
  </div>
</div>
{{end}}
