{{define "content"}}
<div class="row justify-content-center" style="margin-top: 10vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card login-card shadow-sm">
      <div class="card-body">
        <h3 class="card-title text-center mb-1">Welcome back</h3>
        <p class="text-center text-muted small mb-4">Log in to Datey to manage your reminders</p>
        {{if .Success}}
          <div class="alert alert-success">{{.Success}}</div>
        {{end}}
        {{if .Error}}
          <div class="alert alert-danger">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/login">
          {{template "csrfField" .}}
          <div class="mb-3">
            <label for="username" class="form-label">Username {{template "requiredIndicator" .}}</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus autocomplete="username" value="{{if .FormData}}{{.FormData.Username}}{{end}}">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password {{template "requiredIndicator" .}}</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-dark w-100">Log In</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
