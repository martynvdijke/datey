{{define "content"}}
<h1 class="mb-4">{{if .Person}}Edit{{else}}Add{{end}} Person</h1>
<div class="row">
  <div class="col-md-8 col-lg-6">
    <form action="/people/new" method="POST">
      {{template "csrfField" .}}
      <div class="mb-3">
        <label for="name" class="form-label">Name {{template "requiredIndicator" .}}</label>
        <input type="text" class="form-control" id="name" name="name" value="{{if .FormData}}{{.FormData.Name}}{{else if .Person}}{{.Person.Name}}{{end}}" required autocomplete="name">
        {{template "fieldError" (dict "Errors" .Errors "Field" "name")}}
      </div>
      <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea class="form-control" id="notes" name="notes" rows="3">{{if .FormData}}{{.FormData.Notes}}{{else if .Person}}{{.Person.Notes}}{{end}}</textarea>
      </div>
      {{if .Groups}}
      <div class="mb-3">
        <label class="form-label">Groups</label>
        <div class="d-flex gap-3 mt-1 flex-wrap">
          {{range .Groups}}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="groups" value="{{.ID}}" id="g-{{.ID}}"{{if $.FormData.GroupIDs}}{{if inList $.FormData.GroupIDs (printf "%d" .ID)}} checked{{end}}{{end}}>
            <label class="form-check-label" for="g-{{.ID}}">{{.Name}}</label>
          </div>
          {{end}}
        </div>
      </div>
      {{end}}
      <button type="submit" class="btn btn-primary">{{if .Person}}Update{{else}}Create{{end}}</button>
      <a href="/people" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{{end}}
