{{define "head_extra"}}
<style>
  #dice-app { max-width: 800px; margin: 0 auto; }
  #dice-results { min-height: 80px; }
  .die-container {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    margin: 0.25rem;
    background: #fff;
    border: 2px solid #dee2e6;
    border-radius: 0.5rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    font-size: 1.5rem;
    font-weight: 700;
    color: #212529;
    transition: transform 0.15s ease;
  }
  .die-container.tumbling {
    animation: dice-tumble 0.4s ease-out;
  }
  @keyframes dice-tumble {
    0% { transform: rotateX(0deg) rotateY(0deg) scale(0.5); opacity: 0.3; }
    50% { transform: rotateX(180deg) rotateY(90deg) scale(1.1); opacity: 0.8; }
    100% { transform: rotateX(360deg) rotateY(180deg) scale(1); opacity: 1; }
  }
  .die-total {
    font-size: 2rem;
    font-weight: 700;
    color: var(--datey-primary, #2d3a5c);
  }
  .quick-pick .btn {
    font-size: 0.875rem;
    padding: 0.25rem 0.75rem;
    margin: 0.125rem;
  }
  .history-entry {
    font-size: 0.875rem;
    padding: 0.375rem 0.5rem;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-entry:last-child { border-bottom: none; }
  .history-entry .roll-expr { font-weight: 500; color: var(--datey-primary, #2d3a5c); }
  .history-entry .roll-total { font-weight: 600; }
  #roll-history-list { max-height: 300px; overflow-y: auto; }
  .dice-error { color: #dc3545; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
  @media (prefers-reduced-motion: reduce) {
    .die-container.tumbling { animation: none; }
  }
  @media (max-width: 576px) {
    .die-container { width: 48px; height: 48px; font-size: 1.2rem; }
    .die-total { font-size: 1.5rem; }
    #roll-history-list { max-height: 200px; }
  }
</style>
{{end}}

{{define "content"}}
<h1 class="mb-4">Dice Roller</h1>
<div id="dice-app">
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-8">
          <label for="dice-input" class="form-label fw-medium">Dice Expression</label>
          <div class="input-group">
            <input type="text" id="dice-input" class="form-control form-control-lg" placeholder="e.g., 2d6+3, d20, 4d6kh3" value="1d20" autofocus>
            <button id="roll-btn" class="btn btn-dark btn-lg" onclick="handleRoll()">
              <span class="btn-text">🎲 Roll</span>
              <span class="spinner-border spinner-border-sm d-none" id="roll-spinner" role="status"><span class="visually-hidden">Rolling...</span></span>
            </button>
          </div>
          <div id="dice-error" class="dice-error"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-2 mb-3">
    <div class="col-12">
      <div class="quick-pick d-flex flex-wrap gap-1">
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('d20')">d20</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('d12')">d12</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('d10')">d10</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('d%')">d%</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('2d6')">2d6</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('3d8')">3d8</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('4d6kh3')">4d6kh3</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="quickRoll('1d20+5')">d20+5</button>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-8">
      <div id="dice-results" class="card shadow-sm">
        <div class="card-body text-center" id="roll-results">
          <p class="text-muted mb-0">Enter an expression and click Roll</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong>History</strong>
          <button class="btn btn-sm btn-outline-danger" onclick="clearHistory()">Clear</button>
        </div>
        <div id="roll-history-list">
          <p class="text-muted text-center small my-3">No rolls yet</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { DiceRoller } from 'https://cdn.jsdelivr.net/npm/@dice-roller/rpg-dice-roller@5.3.0/lib/esm/bundle.min.js';
  window.DiceRoller = DiceRoller;

  const history = [];
  const maxHistory = 50;
  let rolling = false;

  window.handleRoll = function() {
    if (rolling) return;
    const input = document.getElementById('dice-input');
    const expression = input.value.trim();
    if (!expression) return;
    performRoll(expression);
  };

  window.quickRoll = function(expr) {
    document.getElementById('dice-input').value = expr;
    performRoll(expr);
  };

  async function performRoll(expression) {
    rolling = true;
    const btn = document.getElementById('roll-btn');
    const spinner = document.getElementById('roll-spinner');
    const btnText = btn.querySelector('.btn-text');
    const errorEl = document.getElementById('dice-error');
    const resultsEl = document.getElementById('roll-results');

    errorEl.style.display = 'none';
    btn.disabled = true;
    spinner.classList.remove('d-none');
    btnText.textContent = 'Rolling...';
    resultsEl.innerHTML = '<p class="text-muted">Rolling...</p>';

    // Small delay for animation
    await new Promise(r => setTimeout(r, 100));

    try {
      const roller = new DiceRoller();
      const roll = roller.roll(expression);

      const notations = roll.notation || expression;
      const total = roll.total;
      const dice = roll.rolls || [];

      // Build dice display
      let html = '<div class="mb-3">';
      html += `<div class="die-total mb-2">Total: ${total}</div>`;
      html += '<div class="dice-list">';

      let dieIndex = 0;
      let allValues = [];

      for (const dieRoll of dice) {
        if (dieRoll.sets) {
          for (const set of dieRoll.sets) {
            for (const val of set) {
              const animClass = 'tumbling';
              html += `<div class="die-container ${animClass}" style="animation-delay: ${dieIndex * 0.05}s">${val}</div>`;
              allValues.push(val);
              dieIndex++;
            }
          }
        } else if (dieRoll.value !== undefined) {
          const animClass = 'tumbling';
          html += `<div class="die-container ${animClass}" style="animation-delay: ${dieIndex * 0.05}s">${dieRoll.value}</div>`;
          allValues.push(dieRoll.value);
          dieIndex++;
        }
      }

      if (dieIndex === 0 && total !== undefined) {
        html += `<div class="die-container tumbling">${total}</div>`;
      }

      html += '</div></div>';

      // Modifier display
      const modMatch = expression.match(/[+-]\d+$/);
      if (modMatch) {
        html += `<div class="text-muted small">${expression} = ${total}</div>`;
      }

      html += `<div class="text-muted small mt-1">Expression: ${notations}</div>`;

      resultsEl.innerHTML = html;

      // Add to history
      const entry = {
        expression: expression,
        total: total,
        timestamp: new Date().toLocaleTimeString()
      };
      history.unshift(entry);
      if (history.length > maxHistory) history.pop();
      renderHistory();

    } catch (err) {
      errorEl.textContent = 'Invalid expression: ' + err.message;
      errorEl.style.display = 'block';
      resultsEl.innerHTML = '<p class="text-muted mb-0">Enter an expression and click Roll</p>';
    }

    btn.disabled = false;
    spinner.classList.add('d-none');
    btnText.textContent = '🎲 Roll';
    rolling = false;
  }

  function renderHistory() {
    const list = document.getElementById('roll-history-list');
    if (history.length === 0) {
      list.innerHTML = '<p class="text-muted text-center small my-3">No rolls yet</p>';
      return;
    }
    list.innerHTML = history.map((entry, idx) =>
      `<div class="history-entry">
        <span>
          <span class="roll-expr">${escapeHtml(entry.expression)}</span>
          <span class="text-muted small ms-1">${entry.timestamp}</span>
        </span>
        <span class="roll-total">${entry.total}</span>
      </div>`
    ).join('');
  }

  window.clearHistory = function() {
    history.length = 0;
    renderHistory();
  };

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  // Enter key to roll
  document.getElementById('dice-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleRoll();
  });

  // Initial roll with default value
  setTimeout(() => performRoll('1d20'), 300);
</script>
{{end}}
