{{define "content"}}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-2">Welcome to Datey</h3>
        <p class="text-muted text-center mb-4">Create the initial administrator account to get started.</p>
        {{if .Error}}
          <div class="alert alert-danger">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/setup">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="8">
            <div class="form-text">At least 8 characters</div>
          </div>
          <button type="submit" class="btn btn-dark w-100">Create Admin</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
